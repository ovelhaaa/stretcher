<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDTSM Phase Vocoder</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #eeeeee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .pedal-container {
            background: linear-gradient(145deg, #2a2a2a, #111111);
            border: 2px solid #444;
            border-radius: 15px;
            padding: 30px;
            width: 350px;
            box-shadow: 10px 10px 30px #0a0a0a, -10px -10px 30px #2a2a2a;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin: 0;
            color: #d1d1d1;
            text-shadow: 1px 1px 2px #000;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.9rem;
            font-weight: bold;
            color: #aaa;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #ff5500;
        }

        .value-display {
            text-align: right;
            font-size: 0.8rem;
            color: #888;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        button {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #444;
        }

        button.active {
            background-color: #ff5500;
            border-color: #ff5500;
            box-shadow: 0 0 10px #ff5500;
        }

        input[type="file"] {
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="pedal-container">
        <h1>FDTSM Vocoder</h1>

        <div class="button-group">
            <button id="btn-mic">Ativar Microfone</button>
            <button id="btn-play">Iniciar AudioContext</button>
        </div>

        <div class="control-group">
            <label for="audio-file">Carregar Áudio Local</label>
            <input type="file" id="audio-file" accept="audio/*">
            <audio id="audio-player" controls style="display:none; width: 100%; margin-top: 5px;"></audio>
        </div>

        <div class="control-group">
            <label for="low-stretch">Graves/Corpo (Stretch)</label>
            <input type="range" id="low-stretch" min="50" max="400" value="100">
            <div class="value-display"><span id="low-val">100</span>%</div>
        </div>

        <div class="control-group">
            <label for="high-stretch">Agudos/Ataque (Stretch)</label>
            <input type="range" id="high-stretch" min="50" max="400" value="100">
            <div class="value-display"><span id="high-val">100</span>%</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
